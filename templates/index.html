<!DOCTYPE html>
<html>

<head>

<title>AI Interview System</title>

<style>

body{
    margin:0;
    padding:0;
    font-family:Arial;
    background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(10px);
    width:500px;
    padding:40px;
    border-radius:25px;
    text-align:center;
}

h1{
    color:white;
}

select{
    width:100%;
    padding:15px;
    border-radius:10px;
    font-size:18px;
}

button{
    margin-top:20px;
    padding:14px 35px;
    border:none;
    border-radius:15px;
    background:linear-gradient(to right,#ff00cc,#3333ff);
    color:white;
    font-size:18px;
    cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h1>🎤 AI Interview Preparation</h1>

<form action="/start" method="POST">

<select name="category">

<option>Python</option>
<option>Java</option>
<option>DBMS</option>
<option>AI/ML</option>

</select>

<br><br>

<button type="submit">
Start Interview
</button>

</form>

</div>

</body>

</html>
