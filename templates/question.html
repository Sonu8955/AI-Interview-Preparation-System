<!DOCTYPE html>
<html>

<head>

<title>Question</title>

<style>

body{
    margin:0;
    padding:0;
    font-family:Arial;
    background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(10px);
    width:600px;
    padding:40px;
    border-radius:25px;
    text-align:center;
}

h1,h2{
    color:white;
}

textarea{
    width:100%;
    height:150px;
    border-radius:15px;
    padding:15px;
    font-size:16px;
}

button{
    margin-top:20px;
    padding:14px 35px;
    border:none;
    border-radius:15px;
    background:linear-gradient(to right,#ff00cc,#3333ff);
    color:white;
    font-size:18px;
    cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h1>💼 Technical Interview</h1>

<h2>{{ question }}</h2>

<form action="/submit" method="POST">

<textarea 
name="answer"
placeholder="Write your answer here...">
</textarea>
<br><br>

<button type="button" onclick="startListening()">
🎤 Start Speaking
</button>

<br>

<button type="submit">
Submit Answer
</button>

</form>

</div>
<script>

function startListening(){

    var recognition = new webkitSpeechRecognition();

    recognition.lang = "en-US";

    recognition.onresult = function(event){

        document.getElementsByName("answer")[0].value =
        event.results[0][0].transcript;

    };

    recognition.start();
}

</script>
</body>

</html>
