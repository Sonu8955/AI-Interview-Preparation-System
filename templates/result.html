<!DOCTYPE html>
<html>

<head>

    <title>Interview Result</title>

    <style>

        body{
            margin:0;
            padding:0;
            font-family:Arial;
            background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            background:rgba(255,255,255,0.1);
            backdrop-filter:blur(10px);
            width:600px;
            padding:40px;
            border-radius:25px;
            text-align:center;
            box-shadow:0 0 30px rgba(0,0,0,0.5);
            border:1px solid rgba(255,255,255,0.2);
        }

        h1{
            color:white;
            font-size:38px;
        }

        h2{
            color:#d1d1ff;
        }

        p{
            font-size:20px;
            color:white;
        }

        .score{
            color:#00ff99;
            font-size:35px;
            font-weight:bold;
        }

        .feedback{
            color:#ffccff;
            font-size:24px;
        }

        a{
            text-decoration:none;
        }

        button{
            margin-top:25px;
            padding:14px 35px;
            border:none;
            border-radius:15px;
            background:linear-gradient(to right,#ff00cc,#3333ff);
            color:white;
            font-size:18px;
            font-weight:bold;
            cursor:pointer;
            transition:0.4s;
        }

        button:hover{
            transform:scale(1.08);
            box-shadow:0 0 20px #ff00cc;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>🤖 AI Feedback</h1>

        <h2>Your Answer:</h2>

        <p>{{ answer }}</p>

        <h2>Your Score:</h2>

        <p class="score">{{ score }}</p>

        <h2>AI Feedback:</h2>

        <p class="feedback">{{ feedback }}</p>

        <a href="/">
            <button>Try Again</button>
        </a>

    </div>

</body>

</html>
